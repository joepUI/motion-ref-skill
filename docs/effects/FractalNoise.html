<H2>Fractal Noise</H2>
<H1>分形噪波</H1>
</div>

<div class="maintext">
<br>
<br> 
<p>能生成各种会动的噪波纹理的效果。分形是指"自己和自己相似"的图形，这里用的是它的噪波。用什么分形配什么噪波，形状变化很大，可以做云、火焰、线条、块状等，作背景非常通用。而且因为是分形，能做循环无缝衔接，特别好用。</p> </div>
